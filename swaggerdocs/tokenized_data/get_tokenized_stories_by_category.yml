Get tokenized stories By Category
---
tags:
  - Tokenized Data Routes

summary: Retrieve a tokenized stories By Category

description: >
 Returns a tokenized story using different Category Names.

parameters:
  - name: 
    in: category_name
    type: string
    required: true
    description: Unique identifier of the story.
    example: aesop,pancha,hito,jataka

responses:
  200:
    description: Stories retrieved successfully
    schema:
      type: Array of Objects
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

  404:
    description: No tokenized stories found for category

  400:
    description: Category Name is Required

  500:
    description: Internal server error
